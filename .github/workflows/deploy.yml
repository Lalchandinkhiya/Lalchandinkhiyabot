# ╔══════════════════════════════════════════════════════════════╗
# ║    LALCHAND INKHIYA BOT - GitHub Actions CI/CD Pipeline      ║
# ╚══════════════════════════════════════════════════════════════╝

name: 🤖 Bot CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Lint & Test ──────────────────────────────────────────────────────────
  lint-and-test:
    name: 🔍 Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black isort pytest pytest-asyncio

      - name: 🎨 Check code formatting (Black)
        run: black --check --diff .

      - name: 📋 Check import sorting (isort)
        run: isort --check-only --diff .

      - name: 🔍 Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --max-complexity=10 --max-line-length=120 --statistics

  # ── Build Docker Image ───────────────────────────────────────────────────
  build-docker:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 📦 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/lalchand-inkhiya-bot:latest
            ${{ secrets.DOCKER_USERNAME }}/lalchand-inkhiya-bot:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to VPS ────────────────────────────────────────────────────────
  deploy-vps:
    name: 🚀 Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /opt/lalchand-bot
            docker pull ${{ secrets.DOCKER_USERNAME }}/lalchand-inkhiya-bot:latest
            docker-compose -f docker/docker-compose.yml down bot
            docker-compose -f docker/docker-compose.yml up -d bot
            docker system prune -f
            echo "✅ Deployment complete!"
